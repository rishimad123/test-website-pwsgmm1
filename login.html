<!DOCTYPE html>
<html lang="en">
<head>
    <script src="env-config.js"></script>
<script>
/* Portable API base: strip hardcoded localhost:3000 → relative URL on any host */
(function() {
  var _f = window.fetch.bind(window);
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url.startsWith('http://localhost:3000'))
      url = url.slice('http://localhost:3000'.length);
    return _f(url, opts);
  };
})();
</script>
    <!-- FILE:// REDIRECT — if opened as a local file, switch to the server -->
    <script>
      if (window.location.protocol === 'file:') {
        var page = window.location.pathname.split('/').pop();
        var hash = window.location.hash || '';
        window.location.replace('http://localhost:3000/' + page + hash);
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-color); /* Soft off-white background */
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle glowing background orb */
        .login-container::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(232, 97, 0, 0.1) 0%, rgba(250, 250, 250, 0) 70%);
            top: -200px;
            right: -200px;
            z-index: 0;
        }

        .login-box {
            background: var(--white);
            padding: 50px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-header i {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        
        .login-header h2 {
            color: var(--dark-color);
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #777;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-color);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(232, 97, 0, 0.15);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .forgot-password {
            color: var(--primary-color);
            font-size: 0.9rem;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-login-submit:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }
        
        .login-footer {
            text-align: center;
            margin-top: 30px;
        }
        
        .login-footer a {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-error {
            background: #FADBD8;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        
        .alert-success {
            background: #D5F4E6;
            color: var(--success);
            border: 1px solid var(--success);
        }
    </style>
    <title>Private Area</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body class="theme-hero">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-om"></i>
                <h2>Volunteer Login</h2>
                <p>Shree Patelwadi Sarvjanik Ganesh Utsav Mandal</p>
            </div>
            
            <div id="alert" class="alert"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-login-submit">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="login-footer">
                
                <p style="margin-top: 15px;"><a href="index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
